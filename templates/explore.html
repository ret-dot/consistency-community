{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-2xl font-bold mb-4">🌍 Explore All Rooms</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {% for item in rooms %}
        <div class="bg-white shadow-md rounded-xl p-4 hover:shadow-lg transition duration-300">
            <h3 class="text-xl font-semibold">{{ item.room.name }}</h3>
            <a href="{{ url_for('room_view', room_id=item.room.id) }}" class="text-blue-600 hover:underline mt-2 block">
                View Room
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
